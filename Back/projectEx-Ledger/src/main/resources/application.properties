# ===============================================================
# Project Configuration
# ===============================================================
spring.application.name=projectEx-Ledger
spring.profiles.active=local

# Include Secret Properties (NOT pushed to git)
spring.config.import=optional:classpath:secret.properties

# ===============================================================
# Database Configuration (MariaDB)
# ===============================================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/exledger_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ===============================================================
# Security & JWT Configuration
# ===============================================================
jwt.secret=${JWT_SECRET}
jwt.token-validity-in-seconds=${JWT_TOKEN_VALIDITY}

# ===============================================================
# External API Integrations
# ===============================================================

# PortOne V2 (Unified Payment & Identity)
portone.store.id=${PORTONE_STORE_ID}
portone.api.secret=${PORTONE_API_SECRET}
portone.channel.key=${PORTONE_PAYMENT_CHANNEL_KEY}
portone.auth-channel.key=${PORTONE_AUTH_CHANNEL_KEY}
external.portone.api-url=https://api.portone.io

# Korea Export-Import Bank (Exchange Rate)
koreaexim.api.base-url=https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON
koreaexim.api.service-key=${KOREAEXIM_SECRET}
koreaexim.api.data-type=AP01

# KG Inicis (Direct API if needed)
kginicis.api.key=${KGINICIS_API_KEY}
kginicis.api.secret=${KGINICIS_SECRET}

# Cloudflare Turnstile (Bot Prevention)
turnstile.secret-key=${TURNSTILE_SECRET_KEY:dummy_secret}

# National Tax Service (Business Verification)
nts.api.key=${NTS_API_KEY}

# ===============================================================
# Spring Ecosystem & Tools
# ===============================================================

# Spring Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Redis Configuration (Embedded Redis for local development)
embedded.redis.enabled=true
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================================================
# Logging & Debugging
# ===============================================================
logging.level.me.projectexledger.domain.settlement.api.PortOneClient=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
